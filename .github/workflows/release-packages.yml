name: Release Packages

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  changesets:
    name: Create Version PR or Publish Release
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Install release tooling
        run: npm ci --ignore-scripts

      - name: Check release versions
        run: npm run release:check-versions

      - name: Create version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          title: Version packages
          commit: Version packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plan:
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    outputs:
      shouldPublish: ${{ steps.plan.outputs.shouldPublish }}
      shouldPublishUi: ${{ steps.plan.outputs.shouldPublishUi }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install release tooling
        run: npm ci --ignore-scripts

      - name: Check for unpublished package versions
        run: npm run release:publish:dry-run

      - name: Export release plan
        id: plan
        run: |
          package_count="$(node -e 'const fs = require("fs"); const packages = JSON.parse(fs.readFileSync("build/release/published-packages.json", "utf8")); process.stdout.write(String(packages.length));')"
          ui_package_count="$(node -e 'const fs = require("fs"); const packages = JSON.parse(fs.readFileSync("build/release/published-packages.json", "utf8")); process.stdout.write(String(packages.filter((releasePackage) => releasePackage.name === "@composables/ui").length));')"
          if [ "$package_count" -gt 0 ]; then
            echo "shouldPublish=true" >> "$GITHUB_OUTPUT"
          else
            echo "shouldPublish=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$ui_package_count" -gt 0 ]; then
            echo "shouldPublishUi=true" >> "$GITHUB_OUTPUT"
          else
            echo "shouldPublishUi=false" >> "$GITHUB_OUTPUT"
          fi

  demo-apk:
    needs: release-plan
    if: needs.release-plan.outputs.shouldPublishUi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Build installable demo APK
        shell: bash
        run: ./gradlew --console=plain :demo:assembleDebug --no-daemon

      - name: Verify demo APK signing
        shell: bash
        run: |
          set -euo pipefail

          android_sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$android_sdk_root" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT must be set to verify APK signing."
            exit 1
          fi

          apk_path="demo/build/outputs/apk/debug/demo-debug.apk"
          apksigner="$(
            find "$android_sdk_root/build-tools" -type f -name apksigner |
              sort -V |
              tail -n 1
          )"

          if [ -z "$apksigner" ]; then
            echo "No apksigner executable found under $android_sdk_root/build-tools."
            exit 1
          fi

          expected_cert_sha256="c3314689ccd411b7d3f4a06d98b40525283017b559c5f9f0badc307f00cd6bd3"
          signing_report="$("$apksigner" verify --print-certs "$apk_path")"
          echo "$signing_report"

          actual_cert_sha256="$(
            printf '%s\n' "$signing_report" |
              awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print $2 }'
          )"

          if [ "$actual_cert_sha256" != "$expected_cert_sha256" ]; then
            echo "Expected demo APK certificate $expected_cert_sha256, got $actual_cert_sha256."
            exit 1
          fi

          release_apk_path="demo/build/outputs/apk/debug/composables-ui-demo.apk"
          cp "$apk_path" "$release_apk_path"

      - name: Upload demo APK
        uses: actions/upload-artifact@v4
        with:
          name: composables-ui-demo-apk
          path: demo/build/outputs/apk/debug/composables-ui-demo.apk
          if-no-files-found: error

  publish:
    needs: [release-plan, demo-apk]
    if: ${{ always() && needs.release-plan.outputs.shouldPublish == 'true' && (needs.release-plan.outputs.shouldPublishUi != 'true' || needs.demo-apk.result == 'success') }}
    runs-on: ubuntu-latest
    environment: publishing
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Install release tooling
        run: npm ci --ignore-scripts

      - name: Publish unpublished packages
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        run: npm run release:publish

      - name: Download demo APK
        if: needs.release-plan.outputs.shouldPublishUi == 'true'
        uses: actions/download-artifact@v4
        with:
          name: composables-ui-demo-apk
          path: release-artifacts

      - name: Create GitHub releases
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = "build/release/published-packages.json";

            if (!fs.existsSync(path)) {
              core.info("No release output file found.");
              return;
            }

            const publishedPackages = JSON.parse(fs.readFileSync(path, "utf8"));
            if (publishedPackages.length === 0) {
              core.info("No packages were published.");
              return;
            }

            for (const releasePackage of publishedPackages) {
              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: releasePackage.tagName,
                target_commitish: context.sha,
                name: releasePackage.tagName,
                draft: true,
                generate_release_notes: true,
              });

              if (releasePackage.name !== "@composables/ui") {
                continue;
              }

              const apkPath = "release-artifacts/composables-ui-demo.apk";
              if (!fs.existsSync(apkPath)) {
                throw new Error(`Missing demo APK at ${apkPath}`);
              }

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: `composables-ui-demo-${releasePackage.version}.apk`,
                data: fs.readFileSync(apkPath),
                headers: {
                  "content-type": "application/vnd.android.package-archive",
                  "content-length": String(fs.statSync(apkPath).size),
                },
              });
            }
