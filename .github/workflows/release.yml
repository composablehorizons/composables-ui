name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  issues: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: publishing
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: gradle/actions/wrapper-validation@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        run: ./gradlew :ui:publishAndReleaseToMavenCentral --no-configuration-cache

  github-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          name: ${{ env.RELEASE_REF }}
          draft: true
          generate_release_notes: true

  report-failure:
    needs: [ publish, github-release ]
    if: ${{ always() && (needs.publish.result == 'failure' || needs.github-release.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Open GitHub issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseRef = '${{ env.RELEASE_REF }}';
            const title = `Release failed for ${releaseRef}`;
            const labels = ['release-failure'];
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const results = {
              'publish': '${{ needs.publish.result }}',
              'github-release': '${{ needs.github-release.result }}',
            };

            const body = [
              `Release failed for \`${releaseRef}\`.`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              'Job results:',
              ...Object.entries(results).map(([job, result]) => `- \`${job}\`: ${result}`),
              '',
              'Please inspect the failed job logs and rerun the release once the issue is fixed.',
            ].join('\n');

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 10,
            });
            const existingIssue = existingIssues.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body,
              });
              return;
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labels[0],
                color: 'd73a4a',
                description: 'Release workflow validation or publishing is failing.',
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels,
            });
