name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ui-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Run formatting and JVM tests
        shell: bash
        run: xvfb-run --auto-servernum ./gradlew --console=plain spotlessCheck jvmTest :packages:cli:test --no-daemon
