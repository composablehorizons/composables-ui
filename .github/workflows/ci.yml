name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  spotless-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          token: ${{ github.token }}

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Spotless Check
        run: ./gradlew --console=plain spotlessCheck
