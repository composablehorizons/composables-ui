[versions]
unstyled = "2.5.0-snapshot"
compose = "1.11.0"
kotlin = "2.3.21"
iconsLucide = "1.1.1"
uriPainter = "1.0.4"
navigation = "2.9.2"
kotlinxSerialization = "1.9.0"
agp = "9.2.1"
android-compile-sdk = "37"
android-min-sdk = "23"
activityCompose = "1.13.0"
interactionCapabilities = "1.0.0"
rippleIndication = "1.1.0"

[libraries]
composables-unstyled = { module = "com.composables:composeunstyled", version.ref = "unstyled" }
composables-unstyled-build-modifier = { module = "com.composables:composeunstyled-build-modifier", version.ref = "unstyled" }
composables-unstyled-stack = { module = "com.composables:composeunstyled-stack", version.ref = "unstyled" }
composables-unstyled-window-container-size = { module = "com.composables:composeunstyled-window-container-size", version.ref = "unstyled" }
composables-icons-lucide = { module = "com.composables:icons-lucide", version.ref = "iconsLucide" }
composables-uri-painter = { module = "com.composables:compose-uri-painter", version.ref = "uriPainter" }
composables-interaction-capabilities = { module = "com.composables:compose-interaction-capabilities", version.ref = "interactionCapabilities" }
composables-ripple-indication = { module = "com.composables:ripple-indication", version.ref = "rippleIndication" }
compose-foundation = { module = "org.jetbrains.compose.foundation:foundation", version.ref = "compose" }
compose-runtime = { module = "org.jetbrains.compose.runtime:runtime", version.ref = "compose" }
compose-ui = { module = "org.jetbrains.compose.ui:ui", version.ref = "compose" }
compose-animation = { module = "org.jetbrains.compose.animation:animation", version.ref = "compose" }
compose-components-resources = { module = "org.jetbrains.compose.components:components-resources", version.ref = "compose" }
androidx-navigation-compose = { module = "org.jetbrains.androidx.navigation:navigation-compose", version.ref = "navigation" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinxSerialization" }

[plugins]
compose = { id = "org.jetbrains.compose", version.ref = "compose" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
android-kotlin-multiplatform-library = { id = "com.android.kotlin.multiplatform.library", version.ref = "agp" }
android-application = { id = "com.android.application", version.ref = "agp" }
